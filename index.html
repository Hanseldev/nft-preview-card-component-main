<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nft-preview-card-component-main</title>
  </head>
  <body class="[ bg-blue-950 ] [ min-h-screen ] [ flex justify-center items-center ]">
    <article class="[ rounded-2xl ] [ p-6 ] [ bg-blue-900 ] [ flex flex-col ] [ max-w-xs md:max-w-sm lg:max-w-md ] [ shadow-[20px_30px_15px_rgba(0,0,0,0.15),_-20px_30px_10px_rgba(0,0,0,0.15)] ]">

      <div class="[ relative ] [ w-fit ] [ mb-4 ] ">

        <img src="src/assets/images/image-equilibrium.jpg" alt="Equilibrum" class="[ rounded-xl ] ">

        <div class=" [ opacity-0 hover:opacity-100 ] [ transition-opacity duration-300 ] [ cursor-pointer ]">

          <div class="[ bg-cyan-primary ] [ w-full h-full ] rounded-2xl [ absolute top-1/2 left-1/2 -translate-1/2 ] [ opacity-60 ]">
          </div>

          <img src="src/assets/images/icon-view.svg" alt="" class="[ absolute top-1/2 left-1/2 -translate-1/2  ]">

        </div>

        
      </div>
      

      <h1 class="[ text-white  hover:text-cyan-primary text-2xl font-semibold ] [ mb-4 ] [ transition-colors duration-300 ]">

        <a href="#">
          Equilibrum #3429
        </a>
      </h1>

      <p class="[ text-blue-800 ] [ mb-4 ]">
        Our Equilibrum collection promotes balance and calm
      </p>

      <div class="[ flex justify-between ] [ text-sm font-bold ] ">
        
        
        <div class="flex flex-1 gap-x-2">
          <img src="src/assets/images/icon-ethereum.svg" alt="">
          <p class="text-cyan-primary text-center">0.041 ETH</p>
        </div>

        <div class="flex flex-1 gap-x-2 justify-end">
          <img src="src/assets/images/icon-clock.svg" alt="">
          <p class="text-blue-800 text-center">3 days left</p>
        </div>
        
      </div>

      <div class="bg-blue-800 h-[1px] my-4 "></div>

      <footer class="flex items-center">
        <img src="src/assets/images/image-avatar.png" alt="Avatar" class="w-12 mr-2 border-white border-2 rounded-full">
        <p class="text-blue-800">Creation of <a href="#" class="text-white hover:text-cyan-primary transition-colors duration-300 ">Jules Wyvern</a></p>
      </footer>
    </article>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
